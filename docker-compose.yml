# ASTRA-M — базовый compose (приложение + облачный Qdrant из .env)
version: '3.8'
services:
  astra-m-bot:
    build: .
    image: astra-m-bot:latest
    container_name: astra-m-bot
    restart: unless-stopped
    env_file: .env
    environment:
      REPOS_BASE_PATH: /repos
    volumes:
      # Монтируем каталог с репозиториями (путь с хоста → в контейнере)
      - ${REPOS_BASE_PATH:-d:/projects}:/repos:ro
