# ASTRA-M — Telegram RAG-бот и веб-интерфейс
services:
  astra-m:
    build: .
    image: astra-m-codesearch:latest
    container_name: astra-m-codesearch
    restart: unless-stopped
    env_file: .env
    environment:
      REPOS_BASE_PATH: /repos
    volumes:
      # Клоны репозиториев с хоста (путь в .env → внутри контейнера /repos, только чтение)
      - ${REPOS_BASE_PATH:-d:/astra-m-project}:/repos:ro
      # Именованные тома ASTRA-M (видны в `docker volume ls` по фиксированным именам):
      #   astra-m-index-state — прогресс/состояние индексации (.index_state)
      #   astra-m-session-logs — логи сессий бота (logs/)
      # Не теряются при пересборке образа; удалять только осознанно.
      - astra-m-index-state:/app/.index_state
      - astra-m-session-logs:/app/logs

volumes:
  astra-m-index-state:
    name: astra-m-index-state
  astra-m-session-logs:
    name: astra-m-session-logs
