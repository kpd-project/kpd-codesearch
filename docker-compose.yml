# Astra M — базовый compose (бот + облачный Qdrant из .env)
name: astra-m
services:
  astra-m-bot:
    build: .
    image: astra-m-bot:latest
    container_name: astra-m-bot
    restart: unless-stopped
    env_file: .env
    environment:
      REPOS_BASE_PATH: /repos
    volumes:
      # Монтируем репозитории KPD (путь с хоста → в контейнере)
      - ${REPOS_BASE_PATH:-d:/kpd-project}:/repos:ro
