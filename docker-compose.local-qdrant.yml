services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: astra-m-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - astra-m-qdrant-storage:/qdrant/storage

  astra-m-bot:
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""

volumes:
  astra-m-qdrant-storage:
